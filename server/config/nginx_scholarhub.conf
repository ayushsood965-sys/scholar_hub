# High-Performance Production Nginx Configuration for HPU ScholarHub
# Target VPS: Ubuntu / Debian with Nginx & PM2

upstream scholarhub_backend {
    server 127.0.0.1:5000 max_fails=3 fail_timeout=10s;
    keepalive 64;
}

server {
    listen 80;
    server_name scholarhub.hpuniv.ac.in;

    # Gzip & Brotli Compression for instant asset delivery
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Gateway Landing Root
    location / {
        root /var/www/scholar_hub/gateway/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Static Cache Headers for JS/CSS bundles
        location ~* \.(?:css|js|jpg|jpeg|gif|png|ico|cur|gz|svg|svgz|mp4|ogg|ogv|webm|htc|woff|woff2)$ {
            expires 1y;
            access_log off;
            add_header Cache-Control "public, immutable";
        }
    }

    # Express Backend API Proxy
    location /api/ {
        proxy_pass http://scholarhub_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for heavy file uploads
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Uploads directory static serving
    location /uploads/ {
        alias /var/www/scholar_hub/server/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }
}
