name: Build and Push to GHCR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - name: gateway
            context: ./gateway
            image: ghcr.io/ayushsood965-sys/scholar_hub/gateway
            uuid: smjga68kbt0ouj9ulrmzt3ib
            build-args: |
              VITE_API_URL=https://server.scholarhubhpu.in
              VITE_SCHOLAR_SYNC_URL=https://sync.scholarhubhpu.in
              VITE_SCHOLAR_TRACK_URL=https://track.scholarhubhpu.in
          - name: scholar_sync
            context: ./scholar_sync
            image: ghcr.io/ayushsood965-sys/scholar_hub/scholar_sync
            uuid: v144s58g2wr1ppkigyjqkib7
            build-args: |
              VITE_API_URL=https://server.scholarhubhpu.in
              VITE_TRACK_URL=https://track.scholarhubhpu.in
              VITE_GATEWAY_URL=https://scholarhubhpu.in
          - name: scholar_track
            context: ./scholar_track
            image: ghcr.io/ayushsood965-sys/scholar_hub/scholar_track
            uuid: gmo2b0t8j5wtwmd96c0b8urq
            build-args: |
              VITE_API_URL=https://server.scholarhubhpu.in
              VITE_SYNC_URL=https://sync.scholarhubhpu.in
              VITE_GATEWAY_URL=https://scholarhubhpu.in
          - name: server
            context: ./server
            image: ghcr.io/ayushsood965-sys/scholar_hub/server
            uuid: z6yvvn6x1l555x48nwoz8zdq
            build-args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ matrix.image }}:latest,${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: ${{ matrix.build-args }}

      - name: Trigger Coolify Deployment
        run: |
          base_url="${{ secrets.COOLIFY_BASE_URL }}"
          base_url="${base_url%/}"
          curl -s --fail --connect-timeout 15 --max-time 30 -X GET \
            "$base_url/api/v1/deploy?uuid=${{ matrix.uuid }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"
